  <!-- this is just the little dropdown "info" box script (yes i vibecoded it sjut up bro), its not that important, and lwk ima

  <script>
    const menuBtn = document.getElementById("menuButton");
    const dropdown = document.getElementById("dropdownMenu");

    menuBtn.addEventListener("click", () => {
      dropdown.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".top-left")) {
        dropdown.classList.remove("show");
      }
    });
  </script>

   <!-- This is the about:blank script (to auto cloak all the links), feel free to just copy the links and bookmark them or something
  idrc, this is here bc there are some uses to about:blank (hapara glitch, harder to ban, etc.)
  !-->

    <script>
        function openBlankCloak(url) {
            const win = window.open('about:blank', '_blank');
            win.document.title = "New Tab";
            win.document.body.style.margin = "0";
            win.document.body.innerHTML =
                `<iframe src="${url}" style="width:100vw;height:100vh;border:none;"></iframe>`;
        }
    </script>
